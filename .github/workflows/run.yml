name: Auto Post
on:
  schedule:
    - cron: '0 */4 * * *' # প্রতি ৪ ঘণ্টা পর পর চলবে
  workflow_dispatch:
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: pip install yt-dlp google-generativeai google-api-python-client
      - run: sudo apt install ffmpeg
      - env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          PICKLE_CONTENT: ${{ secrets.PICKLE_CONTENT }}
        run: python main.py
        
