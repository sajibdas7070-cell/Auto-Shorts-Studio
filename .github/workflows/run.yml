name: Ultimate Research Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * *' # প্রতিদিন রাত ৮টায় অটো চলবে

jobs:
  research-grade-production:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: 1. Setup High-Performance Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' 

      - name: 2. Install Cinematic Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libavcodec-extra
          pip install --upgrade pip
          pip install requests google-generativeai google-api-python-client duckduckgo-search mutagen numpy pillow

      - name: 3. Run The Research Engine
        run: python main.py
        
